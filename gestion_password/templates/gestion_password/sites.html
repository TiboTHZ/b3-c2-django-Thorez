<!-- gestion_sites/templates/gestion_sites/liste_sites.html -->
<h2>Liste des sites</h2>
<ul>
  {% for site in sites %}
    <li>{{ site.nom }} - {{ site.url }} - {{ site.identifiant }} - {{ site.mot_de_passe }} | 
        <a href="{% url 'modifier_site' pk=site.pk %}">Modifier</a> | 
        <a href="{% url 'supprimer_site' pk=site.pk %}">Supprimer</a>
    </li>
  {% endfor %}
</ul>
<a href="{% url 'ajouter_site' %}">Ajouter un nouveau site</a>
